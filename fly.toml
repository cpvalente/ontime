app = "on-time"
primary_region = "yyz"

[build]

[env]
  PORT = "4001"
  HOST = "0.0.0.0"
  NODE_ENV = "docker"
  ONTIME_DATA = "/data/"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
